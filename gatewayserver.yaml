server:
  port: 8092

eureka:
  instance:
    prefer-ip-address: true
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http://localhost:8091/eureka

spring:
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true
  security:
    oauth2:
      resourceserver:
        jwt:
          # Internal JWKS endpoint (Docker network). Falls back to localhost for
          # non-container runs. Overridden in Compose via KEYCLOAK_JWK_SET_URI.
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:7080/realms/diningplate/protocol/openid-connect/certs}

diningplate:
  security:
    # Public issuer the browser sees; the `iss` claim is validated against this.
    public-issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:7080/realms/diningplate}
    cors:
      allowed-origins: ${GATEWAY_CORS_ALLOWED_ORIGINS:http://localhost:5173}

management:
  endpoints:
    web:
      exposure:
        include: "*"
